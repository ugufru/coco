<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Space Warp — 60-Frame Cycle Budget</title>
<style>
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Menlo', 'Consolas', monospace; margin: 0; padding: 20px; }
  h1 { color: #00ff88; font-size: 18px; margin-bottom: 4px; }
  h2 { color: #888; font-size: 13px; font-weight: normal; margin-top: 0; }
  .chart-container { position: relative; margin: 20px 0; }
  canvas { display: block; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 2px; }
  .stats { margin-top: 20px; font-size: 13px; line-height: 1.8; }
  .stats .over { color: #ff4444; }
  .stats .ok { color: #00ff88; }
</style>
</head>
<body>

<h1>Space Warp — 60-Frame Cycle Map (1 Second @ 60fps)</h1>
<h2>Level 10: 3 Jovians (slot-based, skip=1), 5 stars, black hole, base — after #349/#350</h2>

<div class="chart-container">
  <canvas id="chart" width="1200" height="500"></canvas>
</div>

<div class="legend" id="legend"></div>

<div class="stats" id="stats"></div>

<script>
const BUDGET = 14930;  // 894886 Hz (14.31818 MHz / 16) / 59.94 Hz NTSC
const FRAMES = 60;
const BAR_W = 16;
const GAP = 4;
const LEFT = 60;
const TOP = 30;
const BOTTOM = 60;
const MAX_CY = 25000;

// Component colors
const COMPONENTS = [
  // Pre-VSYNC every-frame breakdown
  { name: 'move-ship',       key: 'ms',    color: '#3377bb' },  // CODE: 4x KBD-SCAN + try-move
  { name: 'process-key',     key: 'pk',    color: '#5599dd' },  // latch-key + key dispatch
  { name: 'save-ship-pos',   key: 'ssp',   color: '#2266aa' },  // copy ship x,y
  { name: 'tick systems',    key: 'tks',   color: '#4488cc' },  // missile + jbeam + destruct
  { name: 'loop overhead',   key: 'lovr',  color: '#336699' },  // frame-tick, overlay checks
  { name: 'tick-energy',     key: 'te',    color: '#227755' },  // energy regen + repair queue
  { name: 'tick-dock',       key: 'td',    color: '#2a9966' },  // docked recharge
  // Even-frame systems
  { name: 'Ship Gravity',    key: 'sgrv',  color: '#cc8844' },  // CODE: merged gravity-well+star-gravity (#242)
  { name: 'Collisions',      key: 'coll',  color: '#66aa44' },
  { name: 'Tick Jovians',    key: 'tjov',  color: '#dd3333' },  // CODE: slot-based scheduling
  { name: 'J0 Think',        key: 'j0',    color: '#ff4444' },
  { name: 'J1 Think',        key: 'j1',    color: '#ff6666' },
  { name: 'J2 Think',        key: 'j2',    color: '#ff8888' },
  // Every-frame contact check (#243)
  { name: 'Jov Contact',     key: 'jcon',  color: '#ee8800' },
  // Odd-frame systems
  { name: 'Jov Grav Pull',   key: 'jgrv',  color: '#cc6600' },  // CODE (#243)
  { name: 'Background',      key: 'bg',    color: '#8866aa' },
  // Post-VSYNC render breakdown
  { name: 'draw-stars',      key: 'rds',   color: '#44aacc' },  // CODE: fixed colors (#249)
  { name: 'draw-jovians',    key: 'rdj',   color: '#55bbdd' },  // DO/LOOP 3 Jovians
  { name: 'draw-ship',       key: 'rsh',   color: '#66ccee' },  // spr-draw ship
  { name: 'bg-jov',          key: 'bgj',   color: '#338899' },  // save/restore jov bgs + oldpos
  { name: 'bg-ship',         key: 'bgs',   color: '#449999' },  // save/restore ship bg
  { name: 'rnd overhead',    key: 'rovr',  color: '#2a6677' },  // conditional checks
  { name: 'Post-Render',     key: 'post',  color: '#668899' },
];

// Jovian think schedule (slot-based, skip=1 at level 10)
// think-slot starts at 0, advances each even frame: 0->1->2->0
// Slot 1=J1, 2=J2, 0(wrap)=J0.  Pattern: J1, J2, J0, J1, J2, J0...
// J0: even frames 4, 10, 16, 22, 28, 34, 40, 46, 52, 58
// J1: even frames 0, 6, 12, 18, 24, 30, 36, 42, 48, 54
// J2: even frames 2, 8, 14, 20, 26, 32, 38, 44, 50, 56
const J0_FRAMES = new Set([4, 10, 16, 22, 28, 34, 40, 46, 52, 58]);
const J1_FRAMES = new Set([0, 6, 12, 18, 24, 30, 36, 42, 48, 54]);
const J2_FRAMES = new Set([2, 8, 14, 20, 26, 32, 38, 44, 50, 56]);

// Gravity frames (grav-tick MOD 4 = 0, even frames 0, 8, 16, 24, 32, 40, 48, 56)
const GRAV_EVEN = new Set([0, 8, 16, 24, 32, 40, 48, 56]);
// Odd gravity frames
const GRAV_ODD = new Set([1, 9, 17, 25, 33, 41, 49, 57]);

// BG slot 1: odd frames where N AND 7 = 7 (#284, moved from 3 to avoid gravity collision)
// BG slot 2: odd frames where N AND 7 = 5
function hasBG(frame) {
  if (frame % 2 === 0) return false;
  const slot = frame & 7;
  return slot === 7 || slot === 5;
}

function buildFrame(f) {
  const even = (f % 2 === 0);
  const isGrav = even ? GRAV_EVEN.has(f) : GRAV_ODD.has(f);
  const hasJ0 = even && J0_FRAMES.has(f);
  const hasJ1 = even && J1_FRAMES.has(f);
  const hasJ2 = even && J2_FRAMES.has(f);
  const anyThink = hasJ0 || hasJ1 || hasJ2;
  const jovMoved = anyThink || (isGrav && !even); // gravity can move Jovians

  // Pre-VSYNC every-frame breakdown (idle path):
  //   move-ship CODE: 993cy (669 base + 108×3 Jovians)
  //   process-key: 785cy (includes latch-key)
  //   save-ship-pos: 374cy
  //   tick systems: 764cy (missile + jbeam + destruct idle)
  //   loop overhead: 429cy (frame-tick +! + overlay checks)
  //   jov-contact CODE: 300cy every frame (#243)
  //   tick-energy: ~175cy idle (not docked, not 16th frame), ~800cy on repair tick
  //   tick-dock: ~212cy idle (not docked), ~2700cy on docked repair tick
  //   ship-gravity CODE: 476cy on grav frames (#242, was 5,776cy)
  //   tick-jovians-inner CODE: ~140cy fire / ~110cy skip (slot-based)
  //   check-win: one-shot per kill, not every frame (#250)
  const isRepairTick = (f % 16 === 0);  // every 16th frame: energy regen + repair
  return {
    ms:   922,                              // move-ship CODE(598 base + 108cy × 3 Jovians) (#343 velocity)
    pk:   785,                              // process-key (idle path, traced)
    ssp:  374,                              // save-ship-pos — fc.py: 374cy exact
    tks:  764,                              // tick-missile(212†) + tick-jbeam(340†) + tick-destruct(212†) idle
    lovr: 429,                              // frame-tick +!(103†) + 2× overlay check(326†)
    te:   isRepairTick ? 800 : 175,         // tick-energy: idle 175cy, repair tick ~800cy (#340)
    td:   212,                              // tick-dock: idle path (not docked) ~212cy
    sgrv: (even && isGrav) ? 466 : 0,       // ship-gravity CODE — fc.py: 466-469cy (#343 velocity @pull)
    coll: !even ? 1833 : 0,                  // check-collisions — moved to odd frames
    tjov: even ? (anyThink ? 140 : 110) : 0,   // tick-jovians-inner CODE (slot-based: ~140 fire, ~110 skip)
    j0:   hasJ0 ? 1449 : 0,                 // jov-think(689-693) + apply-intent(752-757) — fc.py
    j1:   hasJ1 ? 1449 : 0,
    j2:   hasJ2 ? 1449 : 0,
    jcon: 294,                               // jov-contact CODE — fc.py: 294cy
    jgrv: !even ? (isGrav ? 494 : 30) : 0,  // jov-gravity-pull CODE — fc.py: 489-494cy
    bg:   hasBG(f) ? ((f & 7) === 7 ? 1360 : 1230) : 0,  // BG slot1=1360†(regen+dock+base-atk), slot2=1230†(stardate+migrate+spawn+cond)
    // Post-VSYNC render breakdown (fc.py values):
    // Full render (jov-moved=1):
    //   draw-stars CODE: 196, draw-jovians-live: 1,151, draw-ship: 819
    //   bg-jov Forth: 2,000 (save 900 + restore 909 + oldpos 191; #248 reverted)
    //   bg-ship: 648 (restore 476 + save-ship-bg CODE 172) (#350)
    //   overhead: 475†, post-render: 1,443† (#349 beam idle guards)
    // Ship-only (moved=1, jov-moved=0): ~3,513cy
    rds:  jovMoved ? 196 : 0,               // draw-stars CODE — fc.py: 195-196cy
    rdj:  jovMoved ? 1151 : 0,              // draw-jovians-live — fc.py: 1,151-1,152cy
    rsh:  819,                               // draw-ship — fc.py: 819-820cy
    bgj:  jovMoved ? 2000 : 0,              // save(900) + restore(909) + oldpos(191) — fc.py, Forth
    bgs:  648,                               // restore(476) + save-ship-bg CODE(172) (#350)
    rovr: jovMoved ? 475 : 603,              // conditional checks (traced)
    post: 1443,                              // post-render: beam guards(477†) + panel(714†) + wins/overlay(252†) (#349)
  };
}

// Build all frames
const frames = [];
for (let f = 0; f < FRAMES; f++) {
  frames.push(buildFrame(f));
}

// Draw
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const chartW = canvas.width - LEFT - 20;
const chartH = canvas.height - TOP - BOTTOM;

function yPos(cy) {
  return TOP + chartH - (cy / MAX_CY) * chartH;
}

// Background
ctx.fillStyle = '#1a1a2e';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Y-axis gridlines
ctx.strokeStyle = '#333';
ctx.lineWidth = 1;
ctx.font = '11px Menlo, Consolas, monospace';
ctx.fillStyle = '#666';
ctx.textAlign = 'right';
for (let cy = 0; cy <= MAX_CY; cy += 5000) {
  const y = yPos(cy);
  ctx.beginPath();
  ctx.moveTo(LEFT, y);
  ctx.lineTo(canvas.width - 20, y);
  ctx.stroke();
  ctx.fillText((cy / 1000).toFixed(0) + 'K', LEFT - 8, y + 4);
}

// Budget line
ctx.strokeStyle = '#ff4444';
ctx.lineWidth = 2;
ctx.setLineDash([6, 4]);
ctx.beginPath();
ctx.moveTo(LEFT, yPos(BUDGET));
ctx.lineTo(canvas.width - 20, yPos(BUDGET));
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = '#ff4444';
ctx.textAlign = 'left';
ctx.fillText('BUDGET 14,930cy', canvas.width - 140, yPos(BUDGET) - 6);

// Draw stacked bars
let overCount = 0;
let totalCycles = 0;

for (let f = 0; f < FRAMES; f++) {
  const x = LEFT + f * (BAR_W + GAP);
  const data = frames[f];
  let y = yPos(0);

  let frameTotal = 0;
  for (const comp of COMPONENTS) {
    const val = data[comp.key];
    if (val === 0) continue;
    const h = (val / MAX_CY) * chartH;
    ctx.fillStyle = comp.color;
    ctx.fillRect(x, y - h, BAR_W, h);
    y -= h;
    frameTotal += val;
  }

  totalCycles += frameTotal;
  if (frameTotal > BUDGET) overCount++;

  // Frame number
  ctx.fillStyle = (f % 2 === 0) ? '#aaa' : '#666';
  ctx.textAlign = 'center';
  ctx.font = '9px Menlo, Consolas, monospace';
  ctx.fillText(f, x + BAR_W / 2, canvas.height - BOTTOM + 14);

  // Even/Odd marker
  ctx.fillStyle = (f % 2 === 0) ? '#4488cc' : '#335566';
  ctx.fillText(f % 2 === 0 ? 'E' : 'O', x + BAR_W / 2, canvas.height - BOTTOM + 26);

  // Over-budget marker
  if (frameTotal > BUDGET) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px Menlo, Consolas, monospace';
    const totalY = yPos(frameTotal);
    ctx.fillText((frameTotal / 1000).toFixed(1) + 'K', x + BAR_W / 2, totalY - 4);
  }
}

// X-axis label
ctx.fillStyle = '#888';
ctx.textAlign = 'center';
ctx.font = '12px Menlo, Consolas, monospace';
ctx.fillText('Frame Number (1 second = 60 frames @ 60fps VSYNC)', LEFT + chartW / 2, canvas.height - 8);

// Y-axis label
ctx.save();
ctx.translate(14, TOP + chartH / 2);
ctx.rotate(-Math.PI / 2);
ctx.fillText('CPU Cycles', 0, 0);
ctx.restore();

// Legend
const legendEl = document.getElementById('legend');
for (const comp of COMPONENTS) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${comp.color}"></div>${comp.name}`;
  legendEl.appendChild(item);
}
// Budget legend
const budgetItem = document.createElement('div');
budgetItem.className = 'legend-item';
budgetItem.innerHTML = `<div class="legend-swatch" style="background:#ff4444; height:3px; margin:5px 0;"></div>Budget (14,930cy)`;
legendEl.appendChild(budgetItem);

// Stats
const avgCycles = totalCycles / FRAMES;
// Effective FPS: frames under budget take 1 VSYNC, over-budget frames take 2
let totalVsyncs = 0;
for (let f = 0; f < FRAMES; f++) {
  let fc = 0;
  for (const comp of COMPONENTS) fc += frames[f][comp.key] || 0;
  totalVsyncs += Math.ceil(fc / BUDGET);
}
const effectiveFPS = Math.round(FRAMES / totalVsyncs * 60 * 10) / 10;
const statsEl = document.getElementById('stats');
statsEl.innerHTML = `
  <span class="${overCount ? 'over' : 'ok'}">Frames over budget: ${overCount} of ${FRAMES} (${Math.round(overCount/FRAMES*100)}%)</span><br>
  <span class="ok">Frames under budget: ${FRAMES - overCount} of ${FRAMES} (${Math.round((FRAMES-overCount)/FRAMES*100)}%)</span><br>
  Average cycles/frame: ${Math.round(avgCycles).toLocaleString()}cy
  (${Math.round(avgCycles / BUDGET * 100)}% of budget)<br>
  Effective FPS: ~${effectiveFPS} fps (over-budget frames drop to 30fps)<br>
  <br>
  <span style="color:#00ff88">CODE word optimizations (#166, #215, #241-#253):</span>
  <code>tick-jovians-inner</code> CODE: slot-based scheduling (254cy path sum; ~140cy fire, ~110cy skip).
  <code>apply-intent</code> CODE with inlined <code>jov-blocked?</code> (1,369cy; was 17,000cy Forth).
  <code>move-ship</code> CODE (993cy; was 1,633cy). Includes ion disable gate (#307).
  <code>jov-contact</code> CODE (294cy) + <code>jov-gravity-pull</code> CODE (494cy; was 5,000cy).
  <code>ship-gravity</code> CODE (476cy; was 5,776cy).
  <code>draw-stars</code> CODE with fixed colors (196cy; was 1,840cy).
  All constants inlined as LIT (#245/#246).
  <br><br>
  <span style="color:#00ff88">Combat rebalance (#306-#348):</span>
  Deflector toggle UP/DOWN, shield bleedthrough below 40%, damage spread across 2-3 systems,
  repair queue with priority ordering, ion disable at 0%, docking requires shields DOWN.
  Added ~387cy/frame from <code>tick-energy</code> (175cy idle) + <code>tick-dock</code> (212cy idle).
  Every 16th frame: repair tick adds ~600-800cy. No new CODE words.
  Peak frame: 14,817cy (99%) on gravity odd frames. <strong>Zero over-budget frames.</strong>
  <br><br>
  <span style="color:#00ff88">Idle-path optimizations (#349-#350):</span>
  <code>save-ship-bg</code> CODE (172cy; was 549cy Forth wrapper) — inlines bg-save + jbeam fill gate (#350).
  Beam idle guards: 3 IF checks gate 6 beam/hit word calls, saving 1,067cy/frame when no beams active (#349).
  Combined savings: ~1,444cy/frame. Peak dropped from 14,817cy (99%) to 13,091cy (88%).
  <br><br>
  <span style="color:#00ff88">Kernel promotion (#332-#337):</span>
  13 CODE words promoted to kernel primitives. 74 total primitives, 3,504 bytes.
  App: 23,773 bytes, headroom ~778 bytes.
  <br><br>
  Note: DO/LOOP and nested-loop costs are fc.py base values (single iteration);
  real multi-iteration costs are higher. Relative comparisons remain valid.
  Repair tick (frame 0, 16, 32, 48) adds ~625cy burst; averaged over 16 frames = ~39cy/frame.
`;
</script>

</body>
</html>
